<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Edit Password – Password Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-body">
    <header class="top-bar">
        <h1 class="app-title">Edit password</h1>
        <nav class="top-nav">
            <a href="{{ url_for('passwords.list_passwords') }}" class="btn secondary-btn">Back to list</a>
        </nav>
    </header>

    <main class="content">
        <section class="panel">
            <form method="post" class="password-form">
                <label>
                    Website / Service
                    <input type="text" name="site" value="{{ entry.site }}" required />
                </label>
                <label>
                    Username
                    <input type="text" name="username" value="{{ entry.username }}" required />
                </label>
                <label>
                    Password
                    <input type="password" name="password" value="{{ password }}" required />
                </label>
                <div class="form-actions">
                    <button type="submit" class="btn primary-btn">Update password</button>
                    <a href="{{ url_for('passwords.list_passwords') }}" class="btn ghost-btn">Cancel</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>

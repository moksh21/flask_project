<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Change Password – Password Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-body">
    <header class="top-bar">
        <h1 class="app-title">Change Password</h1>
        <nav class="top-nav">
            <a href="{{ url_for('profile.view_profile') }}" class="btn secondary-btn">Back to Profile</a>
        </nav>
    </header>

    <main class="content">
        <section class="panel">
            <form method="post" class="password-form">
                <label>
                    Current Password
                    <input type="password" name="current_password" required />
                </label>
                
                <label>
                    New Password
                    <input type="password" name="new_password" required minlength="6" />
                </label>
                
                <label>
                    Confirm New Password
                    <input type="password" name="confirm_password" required minlength="6" />
                </label>
                
                <div class="password-requirements">
                    <h4>Password Requirements:</h4>
                    <ul>
                        <li>At least 6 characters long</li>
                        <li>Should be different from current password</li>
                    </ul>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn primary-btn">Change Password</button>
                    <a href="{{ url_for('profile.view_profile') }}" class="btn ghost-btn">Cancel</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
